name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run JavaScript compatibility check
      run: npm run lint
      
    - name: Run basic validation tests
      run: npm test
      
    - name: Run realistic test suite
      run: npm run test:realistic
      
    - name: Run QEMU validation tests
      run: npm run test:qemu-validation
      
    - name: Generate test coverage report
      run: npm run test:coverage
      
    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports-node-${{ matrix.node-version }}
        path: tests/reports/
        retention-days: 30
        include-hidden-files: true
        
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports-node-${{ matrix.node-version }}
        path: coverage/
        retention-days: 30
        include-hidden-files: true
        
  browser-compatibility:
    name: Browser Compatibility
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install system dependencies for Puppeteer
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libnss3-dev \
          libatk-bridge2.0-dev \
          libdrm2 \
          libxkbcommon0 \
          libgbm1 \
          libasound2
          
    - name: Run browser compatibility tests
      run: npm run test:browser-compat
      
    - name: Upload browser test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: browser-compatibility-results
        path: tests/reports/
        retention-days: 30

  qemu-validation:
    name: QEMU Command Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install QEMU for validation
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-system-x86
        
    - name: Verify QEMU installation
      run: qemu-system-x86_64 --version
      
    - name: Run QEMU command validation
      run: npm run test:qemu-validation
      
    - name: Upload QEMU validation results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: qemu-validation-results
        path: tests/reports/
        retention-days: 30

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run security audit
      run: npm audit --audit-level=moderate || echo "Audit completed with findings"
      
    - name: Check for outdated dependencies
      run: npm outdated || true
      
    - name: Run dependency check
      run: |
        echo "Checking for known vulnerabilities in dependencies..."
        npx audit-ci --moderate || echo "Vulnerability check completed"
        
  lint-and-format:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run JavaScript compatibility analysis
      run: npm run lint
      
    - name: Check browser compatibility targets
      run: npx browserslist
      
    - name: Validate HTML structure
      run: |
        echo "Validating HTML structure..."
        # Basic HTML validation
        if command -v tidy &> /dev/null; then
          tidy -q -e index.html || echo "HTML validation completed"
        else
          echo "HTML Tidy not available, skipping validation"
        fi
        
  deployment-preview:
    name: Deployment Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Start test server
      run: |
        npm run serve &
        sleep 5
        
    - name: Test deployment
      run: |
        curl -f http://localhost:3000 > /dev/null
        echo "✅ Deployment preview accessible"
        
    - name: Generate deployment artifact
      run: |
        mkdir -p deployment-preview
        cp index.html deployment-preview/
        cp README.md deployment-preview/
        echo "Preview generated at $(date)" > deployment-preview/build-info.txt
        
    - name: Upload deployment preview
      uses: actions/upload-artifact@v4
      with:
        name: deployment-preview
        path: deployment-preview/
        retention-days: 7